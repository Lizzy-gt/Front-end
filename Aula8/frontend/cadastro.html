<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/global.css" />
    <link rel="stylesheet" href="src/styles/cadastro.css" />
    <title>TechFood - Cadastrar Prato</title>
  </head>
  <body>
    <header id="topo-loja">
      <h1 id="titulo-site">TechFood - Sabor & Saber</h1>
      <p id="boas-vindas">Carregando...</p>

      <input type="checkbox" id="bt_menu" />
      <label for="bt_menu" id="label-menu" aria-label="Abrir menu"
        >&#9776;</label
      >

      <nav id="menu" role="navigation" aria-label="Menu principal">
        <ul>
          <li><a href="index.html">Cardápio</a></li>
          <li><a href="pedido.html">Meus Pedidos</a></li>
          <li><a href="cadastro.html" class="ativo">Cadastrar Prato</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section class="cadastro-container">
        <h2>Cadastro de Produtos</h2>

        <form id="formularioCadastro" class="formulario-cadastro" enctype="multipart/form-data">
          <div class="form-group">
            <label for="nome">Nome do Produto:</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Digite o nome do produto"
              required
            />
          </div>

          <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea
              id="descricao"
              name="descricao"
              placeholder="Digite a descrição do produto"
              rows="4"
              required
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="preco">Preço (R$):</label>
              <input
                type="number"
                id="preco"
                name="preco"
                placeholder="0.00"
                step="0.01"
                min="0"
                required
              />
            </div>

            <div class="form-group">
              <label for="categoria">Categoria:</label>
              <select id="categoria" name="categoria" required>
                <option value="">Selecione uma categoria</option>
                <option value="Bebida">Bebida</option>
                <option value="Prato">Prato</option>
                <option value="Sobremesa">Sobremesa</option>
                <option value="Entrada">Entrada</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="imagem">Imagem do Produto:</label>
            <div class="upload-area" id="uploadArea">
              <input
                type="file"
                id="imagem"
                name="imagem"
                accept="image/*"
                style="display: none"
              />
              <p>Clique ou arraste a imagem aqui</p>
              <span id="nomeArquivo"></span>
            </div>
            <img id="previewImagem" alt="Preview da imagem" style="display: none" />
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn btn-cadastro">Cadastrar Produto</button>
            <button type="reset" class="btn btn-limpar">Limpar Formulário</button>
          </div>
        </form>

        <div id="mensagem" class="mensagem" style="display: none;"></div>
      </section>

      <section class="produtos-container">
        <h2>Produtos Cadastrados</h2>
        <div id="listaProdutos" class="lista-produtos"></div>
      </section>
    </main>

    <footer id="rodape">
      <div class="info-footer">
        <p><strong>TechFood 2026</strong></p>
        <p>Escola SENAI Ítalo Bologna - Itu/SP</p>
        <p>Av. das Nações, 1500</p>
      </div>
      <p id="data-hora-footer"></p>
    </footer>

    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/cadastro.js"></script>
    
  </body>
</html>
